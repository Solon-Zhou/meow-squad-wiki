<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="喵喵特攻隊 — 每日任務清單，日常、週常與活動任務一覽">
    <title>每日任務 — 喵喵特攻隊</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;600;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="navbar-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
        <section class="page-header">
            <h1>📋 每日任務</h1>
            <p>日常、週常與活動任務清單，確保每天不遺漏任何獎勵</p>
        </section>

        <!-- 分類篩選 -->
        <div class="event-filter-bar" id="daily-filter-bar">
            <button class="event-filter-btn active" data-type="">全部</button>
            <button class="event-filter-btn" data-type="日常">☀️ 日常</button>
            <button class="event-filter-btn" data-type="週常">📅 週常</button>
            <button class="event-filter-btn" data-type="活動">🎉 活動限定</button>
        </div>

        <div id="daily-table-container"></div>
    </main>

    <div id="rightsidebar-placeholder"></div>
    <div id="footer-placeholder"></div>
    <script src="js/app.js"></script>
    <script src="js/daily.js"></script>
</body>

</html>
