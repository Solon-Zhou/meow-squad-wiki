<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="喵喵特攻隊 — 功能解鎖條件，各系統開鎖關卡與開服天數限制">
    <title>功能解鎖 — 喵喵特攻隊</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;600;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="navbar-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
        <section class="page-header">
            <h1>🔓 功能解鎖</h1>
            <p>掌握各系統的解鎖關卡與開服天數限制，精準規劃成長路線</p>
        </section>

        <!-- 篩選列 -->
        <div class="filter-bar">
            <label for="filter-category">章節分類</label>
            <select id="filter-category" class="filter-select">
                <option value="">全部章節</option>
                <option value="1">第一章 (1-x)</option>
                <option value="2">第二章 (2-x)</option>
                <option value="3">第三章 (3-x)</option>
                <option value="4">第四章 (4-x)</option>
                <option value="5">第五章 (5-x)</option>
                <option value="6">第六章以上</option>
            </select>
            <input type="text" id="filter-search" class="filter-input" placeholder="🔍 搜尋功能名稱...">
        </div>

        <div class="data-table-wrapper animate-in">
            <table class="data-table">
                <thead>
                    <tr id="table-header">
                        <th data-key="name">功能名稱<span class="sort-icon">⇅</span></th>
                        <th data-key="stage">解鎖關卡<span class="sort-icon">⇅</span></th>
                        <th data-key="days">開服天數<span class="sort-icon">⇅</span></th>
                        <th>備註</th>
                    </tr>
                </thead>
                <tbody id="features-tbody"></tbody>
            </table>
        </div>

        <div id="empty-state" class="empty-state" style="display:none;">
            <div class="empty-icon">🔍</div>
            <p>沒有找到符合條件的功能</p>
        </div>
    </main>

    <div id="rightsidebar-placeholder"></div>
    <div id="footer-placeholder"></div>
    <script src="js/app.js"></script>
    <script src="js/features.js"></script>
</body>

</html>
