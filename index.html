<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="喵喵特攻隊 — 非官方玩家攻略百科，角色資訊、翅膀升級、功能解鎖與活動資訊僅供參考">
  <title>喵喵特攻隊 — 非官方攻略百科</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;600;700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="navbar-placeholder"></div>
  <div id="sidebar-placeholder"></div>

  <main class="main-content">
    <!-- Hero -->
    <section class="hero">
      <h1>喵喵特攻隊</h1>
      <p>🐾 專業角色評測 · 🪽 翅膀養成指南 · 🔓 系統解鎖大全<br>與您的喵喵英雄一起並肩作戰</p>
    </section>

    <!-- 快速入口 -->
    <section class="card-grid" id="quick-links">
      <a href="game/characters.html" class="card quick-card animate-in">
        <span class="card-icon">🧙</span>
        <h3 class="card-title">角色資訊</h3>
        <p class="card-desc">查看所有角色的種族、派系、技能組與詞綴</p>
      </a>
      <a href="game/wings.html" class="card quick-card animate-in">
        <span class="card-icon">🪽</span>
        <h3 class="card-title">翅膀升級</h3>
        <p class="card-desc">UR/SSR 翅膀升級所需碎片、羽毛與前置條件</p>
      </a>
      <a href="game/features.html" class="card quick-card animate-in">
        <span class="card-icon">🔓</span>
        <h3 class="card-title">功能解鎖</h3>
        <p class="card-desc">各系統開鎖關卡、通關需求與開服天數限制</p>
      </a>
      <a href="game/events.html" class="card quick-card animate-in">
        <span class="card-icon">📅</span>
        <h3 class="card-title">活動資訊</h3>
        <p class="card-desc">戰令、衝刺、嘉年華與新角色上線日程</p>
      </a>
    </section>

    <!-- 重點提醒 -->
    <section style="margin-top: 2rem;">
      <h2 style="font-size:1.1rem;font-weight:700;margin-bottom:0.75rem;color:var(--text-primary);">📌 重點提醒</h2>
      <div class="card animate-in" style="cursor:default;padding:1rem 1.25rem;">
        <div style="display:flex;gap:0.5rem;align-items:center;margin-bottom:0.5rem;">
          <span class="badge badge-ssr">注意</span>
          <span style="font-size:0.85rem;color:var(--text-muted);">翅膀活動策略</span>
        </div>
        <p style="font-size:0.9rem;color:var(--text-secondary);line-height:1.6;">
          ⚠️ <strong style="color:var(--warning);">翅膀嘉年華（第9天）開啟後</strong>，再進行翅膀衝刺效益最大化！<br>
          不要在嘉年華開啟前消耗 UR/SSR 羽毛。
        </p>
      </div>
    </section>
  </main>

  <div id="rightsidebar-placeholder"></div>
  <div id="footer-placeholder"></div>
  <script src="js/app.js"></script>
</body>

</html>
